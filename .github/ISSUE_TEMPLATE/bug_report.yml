name: Bug Report
description: Report a bug in dockup
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. dockup validate --config app.dockup.json
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: dockup version
      placeholder: 1.1.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 15
    validations:
      required: true
